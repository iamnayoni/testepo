<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>성산일출봉 등반</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Noto Sans KR',sans-serif; }
  canvas { display:block; }

  #ui {
    position:fixed; top:0; left:0; right:0; bottom:0;
    pointer-events:none;
  }

  /* HUD */
  #hud {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    display:flex; gap:20px; align-items:center;
  }
  .hud-box {
    background:rgba(0,0,0,0.45); backdrop-filter:blur(8px);
    border:1px solid rgba(255,200,100,0.3);
    border-radius:10px; padding:8px 18px;
    color:#FFE0A0; font-size:13px; letter-spacing:0.05em;
  }
  .hud-box strong { font-size:18px; color:#FFD060; display:block; line-height:1.2; }

  /* progress bar */
  #progress-wrap {
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    width:min(340px,80vw);
  }
  #progress-label {
    color:rgba(255,220,140,0.8); font-size:12px; margin-bottom:5px;
    display:flex; justify-content:space-between;
  }
  #progress-bar-bg {
    height:6px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden;
  }
  #progress-bar {
    height:100%; width:0%; background:linear-gradient(90deg,#FF8C42,#FFD060);
    border-radius:3px; transition:width 0.3s;
  }

  /* controls hint */
  #controls {
    position:absolute; bottom:60px; right:20px;
    background:rgba(0,0,0,0.4); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px; padding:10px 14px;
    color:rgba(255,255,255,0.6); font-size:11px; line-height:1.8;
  }
  #controls span { color:rgba(255,220,120,0.9); }

  /* START SCREEN */
  #start-screen {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:linear-gradient(160deg,rgba(10,5,30,0.92) 0%,rgba(30,10,5,0.85) 100%);
    pointer-events:all;
  }
  #start-screen h1 {
    font-size:clamp(28px,6vw,52px); color:#FFD060;
    text-shadow:0 0 40px rgba(255,160,40,0.6);
    letter-spacing:0.08em; margin-bottom:8px;
  }
  #start-screen .sub {
    color:rgba(255,200,120,0.7); font-size:clamp(13px,2vw,16px);
    margin-bottom:40px; letter-spacing:0.1em;
  }
  #start-btn {
    pointer-events:all; cursor:pointer;
    background:linear-gradient(135deg,#FF8C42,#FFD060);
    color:#1A0800; font-size:16px; font-weight:700;
    border:none; border-radius:30px; padding:14px 44px;
    letter-spacing:0.1em;
    box-shadow:0 0 30px rgba(255,180,60,0.4);
    transition:transform .15s, box-shadow .15s;
  }
  #start-btn:hover { transform:scale(1.05); box-shadow:0 0 50px rgba(255,180,60,0.6); }
  .tip { color:rgba(255,255,255,0.35); font-size:12px; margin-top:20px; }

  /* WIN SCREEN */
  #win-screen {
    position:absolute; inset:0;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    background:linear-gradient(160deg,rgba(10,5,30,0.88),rgba(40,15,0,0.88));
    pointer-events:all;
  }
  #win-screen h2 {
    font-size:clamp(24px,5vw,44px); color:#FFD060;
    text-shadow:0 0 40px rgba(255,200,60,0.7);
    margin-bottom:10px;
  }
  #win-screen p { color:rgba(255,220,160,0.8); font-size:15px; margin-bottom:32px; }
  #retry-btn {
    pointer-events:all; cursor:pointer;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,200,100,0.5);
    color:#FFD060; font-size:15px;
    border-radius:24px; padding:12px 36px;
    transition:background .15s;
  }
  #retry-btn:hover { background:rgba(255,200,100,0.2); }

  /* mobile joystick */
  #joystick-zone {
    position:absolute; bottom:90px; left:20px;
    width:110px; height:110px;
    display:none;
    pointer-events:all;
  }
  #joystick-bg {
    width:110px; height:110px; border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.15);
    position:absolute;
  }
  #joystick-dot {
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,200,80,0.5);
    border:2px solid rgba(255,200,80,0.8);
    position:absolute;
    top:50%; left:50%; transform:translate(-50%,-50%);
  }
  @media(pointer:coarse){ #joystick-zone{ display:block; } #controls{ display:none; } }
</style>
</head>
<body>
<div id="ui">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-box">고도 <strong id="alt">0m</strong></div>
    <div class="hud-box">정상까지 <strong id="dist">--m</strong></div>
    <div class="hud-box">시간 <strong id="timer">0:00</strong></div>
  </div>

  <!-- progress -->
  <div id="progress-wrap">
    <div id="progress-label"><span>등반 진행도</span><span id="pct">0%</span></div>
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  </div>

  <!-- controls -->
  <div id="controls">
    <span>WASD</span> / 방향키 이동<br>
    <span>마우스</span> 시점 회전<br>
    <span>Space</span> 점프<br>
    <span>Shift</span> 달리기
  </div>

  <!-- joystick -->
  <div id="joystick-zone">
    <div id="joystick-bg"></div>
    <div id="joystick-dot"></div>
  </div>

  <!-- start -->
  <div id="start-screen">
    <h1>성산일출봉</h1>
    <div class="sub">城山日出峰 · 일출을 향한 등반</div>
    <button id="start-btn">등반 시작</button>
    <div class="tip">마우스로 시점을 조작하고 WASD로 이동하세요</div>
  </div>

  <!-- win -->
  <div id="win-screen">
    <h2>🌅 일출 성공!</h2>
    <p id="win-msg">정상에서 일출을 맞이했습니다!</p>
    <button id="retry-btn">다시 등반</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── Scene setup ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1A0E1E, 0.006);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 800);
camera.position.set(0, 3, 0);

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ── Terrain generation (Seongsan Ilchulbong shape) ───────────────
const TERRAIN_SIZE = 200;
const TERRAIN_SEGS = 120;
const geom = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
geom.rotateX(-Math.PI/2);

const pos = geom.attributes.position;
const PEAK_X = 0, PEAK_Z = -10;
const PEAK_H = 52;        // 성산일출봉 실제 높이 ~182m, 게임 스케일
const CRATER_R = 10;      // 분화구 반경
const BASE_R = 60;

function noise(x, z, freq, amp) {
  return Math.sin(x*freq + 1.3)*Math.cos(z*freq*0.8 + 0.7)*amp;
}
function terrainHeight(x, z) {
  const dx = x - PEAK_X, dz = z - PEAK_Z;
  const r = Math.sqrt(dx*dx + dz*dz);

  // volcanic cone shape
  const cone = Math.max(0, 1 - r / BASE_R);
  let h = Math.pow(cone, 1.5) * PEAK_H;

  // crater depression at top
  if (r < CRATER_R * 2) {
    const craterFactor = Math.max(0, 1 - r/CRATER_R);
    h -= craterFactor * craterFactor * 12;
  }

  // rocky ridgelines — asymmetric like the real peak
  h += noise(x, z, 0.18, 2.2);
  h += noise(x, z, 0.35, 1.1);
  h += noise(x*1.3, z, 0.6, 0.6);

  // cliff-like drop on east side (ocean side)
  if (dx > 5 && r > 20) {
    h *= Math.max(0, 1 - (dx - 5)*0.015);
  }

  // ocean base — gentle tidal flat
  if (r > BASE_R) h = Math.max(0, h + noise(x,z,0.05,0.8) - 0.3);

  return Math.max(-0.5, h);
}

// Apply heights
for (let i = 0; i < pos.count; i++) {
  const x = pos.getX(i), z = pos.getZ(i);
  pos.setY(i, terrainHeight(x, z));
}
geom.computeVertexNormals();

// Terrain color by height
const colors = [];
for (let i = 0; i < pos.count; i++) {
  const h = pos.getY(i);
  let r, g, b;
  if (h < 0.5) { r=0.28;g=0.22;b=0.16; }          // dark mud
  else if (h < 8) { r=0.32;g=0.26;b=0.18; }        // brown volcanic soil
  else if (h < 22) { r=0.24;g=0.20;b=0.15; }       // dark rock
  else if (h < 38) { r=0.30;g=0.24;b=0.17; }       // upper rock
  else { r=0.38;g=0.32;b=0.24; }                   // summit basalt
  // small variation
  const v = (Math.random()-0.5)*0.04;
  colors.push(r+v, g+v, b+v);
}
geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true });
const terrain = new THREE.Mesh(geom, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// ── Ocean ────────────────────────────────────────────────────────
const seaGeo = new THREE.PlaneGeometry(600, 600, 1, 1);
seaGeo.rotateX(-Math.PI/2);
const seaMat = new THREE.MeshLambertMaterial({ color:0x0A2A4A, transparent:true, opacity:0.88 });
const sea = new THREE.Mesh(seaGeo, seaMat);
sea.position.y = -0.3;
scene.add(sea);

// ── Rocks scattered on the slope ────────────────────────────────
function addRock(x, z, scale) {
  const h = terrainHeight(x, z);
  if (h < 1) return;
  const rg = new THREE.DodecahedronGeometry(scale * (0.8 + Math.random()*0.6), 0);
  const rm = new THREE.MeshLambertMaterial({
    color: new THREE.Color(0.22+Math.random()*0.06, 0.18+Math.random()*0.04, 0.14)
  });
  const rock = new THREE.Mesh(rg, rm);
  rock.position.set(x, h + scale*0.3, z);
  rock.rotation.set(Math.random()*2, Math.random()*6, Math.random()*2);
  rock.castShadow = true;
  scene.add(rock);
}
for (let i = 0; i < 260; i++) {
  const angle = Math.random()*Math.PI*2;
  const r = 5 + Math.random()*55;
  addRock(PEAK_X + Math.cos(angle)*r, PEAK_Z + Math.sin(angle)*r, 0.4+Math.random()*1.2);
}

// ── Path markers (wooden stakes) ─────────────────────────────────
const PATH_POINTS = [];
// Spiral path from base to summit
for (let i = 0; i <= 36; i++) {
  const t = i / 36;
  const angle = t * Math.PI * 2.8 - Math.PI*0.5;
  const radius = BASE_R * (1 - t) * 0.82 + 4;
  const px = PEAK_X + Math.cos(angle) * radius;
  const pz = PEAK_Z + Math.sin(angle) * radius;
  const py = terrainHeight(px, pz);
  PATH_POINTS.push(new THREE.Vector3(px, py, pz));
}

PATH_POINTS.forEach((pt, i) => {
  if (i % 3 !== 0) return;
  const pg = new THREE.CylinderGeometry(0.06, 0.08, 1.2, 5);
  const pm = new THREE.MeshLambertMaterial({ color:0x8B5A2B });
  const stake = new THREE.Mesh(pg, pm);
  stake.position.set(pt.x, pt.y + 0.6, pt.z);
  scene.add(stake);
  // small flag
  const fg = new THREE.PlaneGeometry(0.4, 0.25);
  const fm = new THREE.MeshLambertMaterial({ color:0xFF6030, side:THREE.DoubleSide });
  const flag = new THREE.Mesh(fg, fm);
  flag.position.set(pt.x + 0.25, pt.y + 1.35, pt.z);
  scene.add(flag);
});

// ── Sky / Atmosphere ─────────────────────────────────────────────
// Sky gradient using large sphere
const skyGeo = new THREE.SphereGeometry(400, 32, 16);
skyGeo.scale(-1,1,1); // invert
const skyMat = new THREE.ShaderMaterial({
  uniforms: { sunProgress: { value: 0.0 } },
  vertexShader: `
    varying vec3 vPos;
    void main(){ vPos = position; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }
  `,
  fragmentShader: `
    uniform float sunProgress;
    varying vec3 vPos;
    void main(){
      float t = clamp((vPos.y + 200.0)/400.0, 0.0, 1.0);
      // pre-dawn: deep purple-navy
      vec3 predawn = mix(vec3(0.04,0.03,0.10), vec3(0.12,0.07,0.22), t);
      // dawn: orange-pink-gold
      vec3 dawn = mix(vec3(0.55,0.18,0.08), vec3(0.90,0.55,0.20), t);
      // morning: blue sky
      vec3 morning = mix(vec3(0.60,0.35,0.15), vec3(0.30,0.55,0.85), t);
      vec3 col;
      if(sunProgress < 0.5) col = mix(predawn, dawn, sunProgress*2.0);
      else col = mix(dawn, morning, (sunProgress-0.5)*2.0);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.BackSide
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// Stars
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 1800; i++) {
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  const r = 350;
  starVerts.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color:0xFFFFFF, size:0.9, transparent:true, opacity:1.0 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Sun
const sunGeo = new THREE.SphereGeometry(5, 16, 16);
const sunMat = new THREE.MeshBasicMaterial({ color:0xFFDD44 });
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.position.set(80, -30, -200);
scene.add(sun);

// Sunlight glow sprite (simple ring)
const glowGeo = new THREE.RingGeometry(6, 18, 32);
const glowMat = new THREE.MeshBasicMaterial({ color:0xFF9900, transparent:true, opacity:0.25, side:THREE.DoubleSide });
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.position.copy(sun.position);
scene.add(glow);

// ── Lighting ─────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x2A1A30, 1.2);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0xFF8822, 0.0);
sunLight.position.set(80, 60, -200);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 400;
sunLight.shadow.camera.left = -100;
sunLight.shadow.camera.right = 100;
sunLight.shadow.camera.top = 100;
sunLight.shadow.camera.bottom = -100;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x334466, 0.5);
fillLight.position.set(-50, 40, 50);
scene.add(fillLight);

// ── Player ───────────────────────────────────────────────────────
const player = {
  pos: new THREE.Vector3(0, 0, BASE_R * 0.85),
  vel: new THREE.Vector3(),
  onGround: false,
  yaw: 0,
  pitch: 0,
  height: 1.7,
  speed: 0,
};
// place player at correct terrain height
player.pos.y = terrainHeight(player.pos.x, player.pos.z) + player.height;

const WALK_SPEED  = 5.5;
const RUN_SPEED   = 10.5;
const JUMP_VEL    = 9.0;
const GRAVITY     = 22;

// ── Input ────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

// Pointer lock
let pointerLocked = false;
renderer.domElement.addEventListener('click', () => {
  if (gameRunning) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked || !gameRunning) return;
  player.yaw   -= e.movementX * 0.002;
  player.pitch -= e.movementY * 0.002;
  player.pitch  = Math.max(-Math.PI*0.38, Math.min(Math.PI*0.38, player.pitch));
});

// Touch joystick
let joyActive = false, joyStartX = 0, joyStartY = 0, joyDX = 0, joyDY = 0;
const joyZone = document.getElementById('joystick-zone');
const joyDot  = document.getElementById('joystick-dot');
joyZone.addEventListener('touchstart', e => {
  joyActive = true;
  joyStartX = e.touches[0].clientX; joyStartY = e.touches[0].clientY;
}, { passive:true });
joyZone.addEventListener('touchmove', e => {
  if (!joyActive) return;
  joyDX = e.touches[0].clientX - joyStartX;
  joyDY = e.touches[0].clientY - joyStartY;
  const mag = Math.min(40, Math.sqrt(joyDX*joyDX + joyDY*joyDY));
  const ang = Math.atan2(joyDY, joyDX);
  joyDot.style.left = (55 + Math.cos(ang)*mag) + 'px';
  joyDot.style.top  = (55 + Math.sin(ang)*mag) + 'px';
}, { passive:true });
['touchend','touchcancel'].forEach(ev => joyZone.addEventListener(ev, () => {
  joyActive = false; joyDX = 0; joyDY = 0;
  joyDot.style.left = joyDot.style.top = '50%';
}));

// Touch look
let lookActive = false, lookLastX = 0, lookLastY = 0;
renderer.domElement.addEventListener('touchstart', e => {
  const t = e.touches[0];
  if (t.clientX > innerWidth * 0.35) { lookActive = true; lookLastX = t.clientX; lookLastY = t.clientY; }
}, { passive:true });
renderer.domElement.addEventListener('touchmove', e => {
  if (!lookActive || !gameRunning) return;
  for (let t of e.touches) {
    if (t.clientX > innerWidth * 0.35) {
      player.yaw   -= (t.clientX - lookLastX) * 0.004;
      player.pitch -= (t.clientY - lookLastY) * 0.004;
      player.pitch  = Math.max(-Math.PI*0.38, Math.min(Math.PI*0.38, player.pitch));
      lookLastX = t.clientX; lookLastY = t.clientY;
    }
  }
}, { passive:true });
renderer.domElement.addEventListener('touchend', () => lookActive = false);

// ── Game state ───────────────────────────────────────────────────
let gameRunning = false;
let startTime = 0;
let won = false;
let sunProgress = 0; // 0..1

const peakPos = new THREE.Vector3(PEAK_X, terrainHeight(PEAK_X, PEAK_Z) + player.height, PEAK_Z);
const startPos = new THREE.Vector3(0, terrainHeight(0, BASE_R*0.85)+player.height, BASE_R*0.85);
const totalDist = startPos.distanceTo(peakPos);

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', () => location.reload());

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  gameRunning = true;
  startTime = performance.now();
  renderer.domElement.requestPointerLock();
}

// ── Clock ─────────────────────────────────────────────────────────
const clock = new THREE.Clock();

// ── Main loop ─────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameRunning && !won) {
    updatePlayer(dt);
    updateHUD();
    animateSky(dt);
    checkWin();
  }

  updateCamera();
  renderer.render(scene, camera);
}

function updatePlayer(dt) {
  // movement direction from yaw
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right   = new THREE.Vector3( Math.cos(player.yaw), 0, -Math.sin(player.yaw));

  let moveX = 0, moveZ = 0;
  const running = keys['ShiftLeft'] || keys['ShiftRight'];
  const spd = running ? RUN_SPEED : WALK_SPEED;

  if (keys['KeyW'] || keys['ArrowUp'])    { moveX += forward.x; moveZ += forward.z; }
  if (keys['KeyS'] || keys['ArrowDown'])  { moveX -= forward.x; moveZ -= forward.z; }
  if (keys['KeyA'] || keys['ArrowLeft'])  { moveX -= right.x;   moveZ -= right.z; }
  if (keys['KeyD'] || keys['ArrowRight']) { moveX += right.x;   moveZ += right.z; }

  // joystick
  if (joyActive) {
    const mag = Math.sqrt(joyDX*joyDX + joyDY*joyDY);
    if (mag > 8) {
      const nx = joyDX/mag, ny = joyDY/mag;
      moveX += forward.x*(-ny) + right.x*nx;
      moveZ += forward.z*(-ny) + right.z*nx;
    }
  }

  // normalize diagonal
  const moveMag = Math.sqrt(moveX*moveX + moveZ*moveZ);
  if (moveMag > 1) { moveX /= moveMag; moveZ /= moveMag; }

  player.vel.x = moveX * spd;
  player.vel.z = moveZ * spd;

  // gravity
  player.vel.y -= GRAVITY * dt;

  // jump
  if ((keys['Space'] || keys['KeyE']) && player.onGround) {
    player.vel.y = JUMP_VEL;
    player.onGround = false;
  }

  // integrate
  player.pos.x += player.vel.x * dt;
  player.pos.z += player.vel.z * dt;
  player.pos.y += player.vel.y * dt;

  // terrain collision
  const gh = terrainHeight(player.pos.x, player.pos.z) + player.height;
  if (player.pos.y <= gh) {
    player.pos.y = gh;
    player.vel.y = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  // boundary — stay on island
  const bnd = TERRAIN_SIZE * 0.48;
  player.pos.x = Math.max(-bnd, Math.min(bnd, player.pos.x));
  player.pos.z = Math.max(-bnd, Math.min(bnd, player.pos.z));
}

function updateCamera() {
  // 3rd-person or 1st-person: we do first-person
  const qYaw   = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), player.yaw);
  const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), player.pitch);
  camera.quaternion.copy(qYaw).multiply(qPitch);
  camera.position.copy(player.pos);
}

function animateSky(dt) {
  // Progress sun from -30 to +80 altitude over the game
  sunProgress = Math.min(1, sunProgress + dt * 0.012);
  skyMat.uniforms.sunProgress.value = sunProgress;

  // Star fade
  starMat.opacity = Math.max(0, 1 - sunProgress * 2.5);

  // Sun rise
  const sunY = -30 + sunProgress * 120;
  sun.position.y = sunY;
  glow.position.y = sunY;
  glow.lookAt(camera.position);

  // Sunlight intensity
  sunLight.intensity = sunProgress * 1.8;
  sunLight.color.setHSL(0.08 + sunProgress * 0.08, 0.9, 0.6);
  ambient.intensity  = 0.4 + sunProgress * 1.0;
  ambient.color.setHSL(0.65 - sunProgress*0.4, 0.3, 0.3 + sunProgress*0.3);
}

function updateHUD() {
  const groundH = terrainHeight(player.pos.x, player.pos.z);
  document.getElementById('alt').textContent = Math.round(groundH * 3.5) + 'm';

  const dx = player.pos.x - PEAK_X, dz = player.pos.z - PEAK_Z;
  const distToPeak = Math.sqrt(dx*dx + dz*dz);
  document.getElementById('dist').textContent = Math.round(distToPeak * 4) + 'm';

  const elapsed = (performance.now() - startTime) / 1000;
  const mins = Math.floor(elapsed / 60);
  const secs = Math.floor(elapsed % 60);
  document.getElementById('timer').textContent = mins + ':' + String(secs).padStart(2,'0');

  const progress = Math.max(0, Math.min(1, 1 - distToPeak / totalDist));
  document.getElementById('progress-bar').style.width = (progress * 100) + '%';
  document.getElementById('pct').textContent = Math.round(progress * 100) + '%';
}

function checkWin() {
  const dx = player.pos.x - PEAK_X, dz = player.pos.z - PEAK_Z;
  const distToPeak = Math.sqrt(dx*dx + dz*dz);
  if (distToPeak < 8) {
    won = true;
    gameRunning = false;
    document.exitPointerLock();
    const elapsed = (performance.now() - startTime) / 1000;
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    document.getElementById('win-msg').textContent =
      `등반 시간: ${mins}분 ${secs}초 · 일출을 맞이하셨습니다! 🌅`;
    const ws = document.getElementById('win-screen');
    ws.style.display = 'flex';
    // force sun to full rise
    sunProgress = 0.9;
  }
}

animate();
</script>
</body>
