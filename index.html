<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제주 게스트하우스</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      line-height: 1.6;
      text-align: center;
    }

    header {
      background: #4aa3df;
      color: white;
      padding: 60px 20px;
    }

    section {
      padding: 40px 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #4aa3df;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    footer {
      background: #f5f5f5;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>제주 게스트하우스</h1>
    <p>제주의 아름다운 바다와 함께하는 편안한 휴식</p>
  </header>

  <section>
    <h2>소개</h2>
    <p>
      제주 여행객을 위한 아늑한 게스트하우스입니다.
      깨끗한 객실과 편안한 분위기를 제공합니다.
    </p>

    <a href="#" class="btn">예약하기</a>
  </section>

  <footer>
    <p>© 2025 제주 게스트하우스</p>
  </footer>

</body>
</html>
